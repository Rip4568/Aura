<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aura Admin{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#0c0714',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex flex-col md:flex-row antialiased font-sans" hx-boost="true">
    
    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col shrink-0">
        <!-- Logo Header -->
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-800">
            <a href="/admin" class="flex items-center gap-2 font-bold text-xl text-brand-400 hover:text-brand-300 transition-colors">
                <svg class="w-6 h-6 animate-pulse text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>Aura Admin</span>
            </a>
        </div>
        
        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
            <div class="px-3 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Navigation</div>
            <a href="/admin" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors {% if not model_name %}bg-slate-800 text-slate-100{% else %}text-slate-400 hover:bg-slate-850 hover:text-slate-200{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path>
                </svg>
                <span>Dashboard</span>
            </a>
            
            <div class="pt-4 px-3 mb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Models</div>
            {% for m in models_nav %}
                <a href="/admin/{{ m.path_name }}" class="flex items-center justify-between px-3 py-2 text-sm font-medium rounded-lg transition-colors {% if model_name|lower == m.path_name %}bg-brand-900/50 text-brand-300 border border-brand-800/50{% else %}text-slate-400 hover:bg-slate-850 hover:text-slate-200{% endif %}">
                    <span class="truncate">{{ m.name }}</span>
                    <span class="text-xs text-slate-500 opacity-60">→</span>
                </a>
            {% endfor %}
        </nav>
        
        <!-- Footer Info -->
        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 flex justify-between items-center bg-slate-900/50">
            <span>Aura Framework v0.3.1</span>
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
        </div>
    </aside>
    
    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <!-- Top bar -->
        <header class="h-16 border-b border-slate-800 bg-slate-900/40 flex items-center justify-between px-6 md:px-8 shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-slate-500">/</span>
                <span class="text-sm font-medium text-slate-300">{% block breadcrumb %}Dashboard{% endblock %}</span>
            </div>
            <div class="flex items-center gap-4">
                {% if has_password %}
                <form action="/admin/logout" method="POST" class="inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="text-xs font-semibold text-slate-400 hover:text-rose-400 transition-colors border border-slate-800 px-3 py-1.5 rounded-lg hover:border-rose-900/50 bg-slate-900/50">Sair</button>
                </form>
                {% endif %}
            </div>
        </header>
        
        <!-- Inner page content -->
        <div class="flex-1 p-6 md:p-8">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
