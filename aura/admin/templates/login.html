<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Admin — Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                            950: '#0c0714',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex items-center justify-center antialiased font-sans p-6">
    <div class="w-full max-w-md bg-slate-900/40 border border-slate-800 backdrop-blur-xl rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        
        <!-- Glowing top border/effect -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-600 to-indigo-600"></div>

        <!-- Logo/Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-brand-900/50 border border-brand-800/50 text-brand-400 rounded-2xl flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-100">Painel Administrativo</h1>
            <p class="text-sm text-slate-500 mt-1">Insira a chave de segurança para prosseguir</p>
        </div>

        <!-- Error Alert -->
        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-rose-950/40 border border-rose-800/40 text-rose-300 text-sm flex items-center gap-3">
            <svg class="w-5 h-5 text-rose-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Form -->
        <form action="/admin/login" method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Chave de Acesso (Senha)</label>
                <input type="password" name="password" id="password" required autofocus
                       placeholder="••••••••"
                       class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors">
            </div>

            <button type="submit"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-3 px-4 rounded-xl text-sm transition-colors shadow-lg shadow-brand-900/20 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-slate-900">
                Acessar Painel
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-slate-600 border-t border-slate-800/60 pt-4">
            Aura Framework v0.3.1
        </div>
    </div>
</body>
</html>
